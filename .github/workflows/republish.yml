name: Republish

# Manual safety net. The normal Release flow publishes to all three registries
# *before* it cuts the tag, so a partial failure normally leaves the version
# un-burned and re-runnable (just re-run release.yml). This workflow is for the
# case where a version was already burned (tag + GitHub Release exist) but one
# registry is still missing the artifacts and the Release flow won't retry it.
#
# NOTE: the build matrix and packaging steps below intentionally mirror
# release.yml. Keep them in sync.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to republish (e.g. v1.0.3)"
        required: true
        type: string
      registry:
        description: "Registry to (re)publish to"
        required: true
        type: choice
        options:
          - crates-io
          - npm
          - pypi
          - all

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: republish-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish-cargo:
    name: Republish to crates.io
    if: inputs.registry == 'crates-io' || inputs.registry == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io (idempotent)
        run: |
          set +e
          out=$(cargo publish --token "${{ secrets.CRATES_IO_TOKEN }}" --allow-dirty 2>&1)
          status=$?
          echo "$out"
          if [ $status -eq 0 ]; then exit 0; fi
          if echo "$out" | grep -qiE "already uploaded|already exists"; then
            echo "Version already on crates.io; nothing to do."
            exit 0
          fi
          exit $status

  build-platform-artifact:
    name: Build Platform Artifacts
    if: inputs.registry == 'npm' || inputs.registry == 'pypi' || inputs.registry == 'all'
    runs-on: ${{ matrix.build.OS }}
    strategy:
      fail-fast: false
      matrix:
        build:
          - { NAME: linux-x64-glibc,  OS: ubuntu-latest, TARGET: x86_64-unknown-linux-gnu,  BINARY_NAME: fzd,     ASSET_NAME: fzd-linux-x86_64,   ARCHIVE_EXT: tar.gz, MATURIN_TARGET: x86_64 }
          - { NAME: linux-arm64-glibc, OS: ubuntu-latest, TARGET: aarch64-unknown-linux-gnu, BINARY_NAME: fzd,     ASSET_NAME: fzd-linux-arm64,    ARCHIVE_EXT: tar.gz, MATURIN_TARGET: aarch64 }
          - { NAME: win32-x64-msvc,   OS: windows-2022,  TARGET: x86_64-pc-windows-msvc,    BINARY_NAME: fzd.exe, ASSET_NAME: fzd-windows-x86_64, ARCHIVE_EXT: zip,    MATURIN_TARGET: x64 }
          - { NAME: win32-arm64-msvc, OS: windows-2022,  TARGET: aarch64-pc-windows-msvc,   BINARY_NAME: fzd.exe, ASSET_NAME: fzd-windows-arm64,  ARCHIVE_EXT: zip,    MATURIN_TARGET: aarch64-pc-windows-msvc }
          - { NAME: darwin-x64,       OS: macos-14,      TARGET: x86_64-apple-darwin,       BINARY_NAME: fzd,     ASSET_NAME: fzd-darwin-x86_64,  ARCHIVE_EXT: tar.gz, MATURIN_TARGET: x86_64 }
          - { NAME: darwin-arm64,     OS: macos-14,      TARGET: aarch64-apple-darwin,      BINARY_NAME: fzd,     ASSET_NAME: fzd-darwin-arm64,   ARCHIVE_EXT: tar.gz, MATURIN_TARGET: aarch64 }
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - name: Build Python wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.build.MATURIN_TARGET }}
          args: --release --out dist
          sccache: true
          manylinux: auto
      - name: Package binary (Unix)
        if: matrix.build.OS != 'windows-2022'
        shell: bash
        run: |
          mkdir -p binary-dist
          cp target/${{ matrix.build.TARGET }}/release/${{ matrix.build.BINARY_NAME }} binary-dist/${{ matrix.build.ASSET_NAME }}
          cd binary-dist && tar -czf ${{ matrix.build.ASSET_NAME }}.tar.gz ${{ matrix.build.ASSET_NAME }}
      - name: Package binary (Windows)
        if: matrix.build.OS == 'windows-2022'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path binary-dist
          Copy-Item "target\${{ matrix.build.TARGET }}\release\${{ matrix.build.BINARY_NAME }}" -Destination "binary-dist\${{ matrix.build.ASSET_NAME }}.exe"
          Compress-Archive -Path "binary-dist\${{ matrix.build.ASSET_NAME }}.exe" -DestinationPath "binary-dist\${{ matrix.build.ASSET_NAME }}.zip"
      - name: Upload Platform Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build.ASSET_NAME }}.${{ matrix.build.ARCHIVE_EXT }}
          path: binary-dist/${{ matrix.build.ASSET_NAME }}.${{ matrix.build.ARCHIVE_EXT }}
          retention-days: 1
      - name: Upload Python Wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.build.NAME }}
          path: dist
          retention-days: 1
      - name: Create Build Info
        shell: bash
        run: |
          mkdir -p build-info
          echo '{
            "name": "${{ matrix.build.NAME }}",
            "os": "${{ matrix.build.OS }}",
            "binary_name": "${{ matrix.build.BINARY_NAME }}"
          }' > build-info/build-info.json
      - name: Upload Build Info
        uses: actions/upload-artifact@v4
        with:
          name: build-info-${{ matrix.build.NAME }}
          path: build-info/build-info.json
          retention-days: 1

  sdist:
    name: Build sdist
    if: inputs.registry == 'pypi' || inputs.registry == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish-pypi:
    name: Republish to PyPI
    needs: [build-platform-artifact, sdist]
    if: inputs.registry == 'pypi' || inputs.registry == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Publish to PyPI (idempotent via --skip-existing)
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --skip-existing wheels-*/*

  publish-npm:
    name: Republish NPM Packages
    needs: build-platform-artifact
    if: inputs.registry == 'npm' || inputs.registry == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Download Platform Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: fzd-*
          path: binary-dist
          merge-multiple: true
      - name: Download build info
        uses: actions/download-artifact@v4
        with:
          pattern: build-info-*
          path: build-info
      - name: Publish to NPM (idempotent)
        shell: bash
        run: |
          # Version comes from the tag itself (strip a leading "v").
          tag="${{ inputs.tag }}"
          export node_version="${tag#v}"
          echo "VERSION: ${node_version}"
          cd packages/npm
          for info_file in ../../build-info/build-info-*/build-info.json; do
            build_info=$(cat "$info_file")
            build_name=$(echo "$build_info" | jq -r '.name')
            build_os=$(echo "$build_info" | jq -r '.os')
            bin="fzd"
            node_os=$(echo "$build_name" | cut -d '-' -f1); export node_os
            node_arch=$(echo "$build_name" | cut -d '-' -f2); export node_arch
            if [ "$build_os" = "windows-2022" ]; then
              export node_pkg="${bin}-windows-${node_arch}"
              [ "$node_arch" = "x64" ] && artifact_name="fzd-windows-x86_64" || artifact_name="fzd-windows-arm64"
            else
              export node_pkg="${bin}-${node_os}-${node_arch}"
              if [ "$node_os" = "darwin" ]; then
                [ "$node_arch" = "x64" ] && artifact_name="fzd-darwin-x86_64" || artifact_name="fzd-darwin-arm64"
              else
                [ "$node_arch" = "x64" ] && artifact_name="fzd-linux-x86_64" || artifact_name="fzd-linux-arm64"
              fi
            fi
            echo "Package: $node_pkg (artifact: $artifact_name)"
            mkdir -p "${node_pkg}/bin"
            envsubst < package.json.tmpl > "${node_pkg}/package.json"
            if [ "$build_os" = "windows-2022" ]; then
              unzip -j "../../binary-dist/${artifact_name}.zip" -d "${node_pkg}/bin/"
              mv "${node_pkg}/bin/${artifact_name}.exe" "${node_pkg}/bin/${bin}.exe"
            else
              tar -xzvf "../../binary-dist/${artifact_name}.tar.gz" -C "${node_pkg}/bin/"
              mv "${node_pkg}/bin/${artifact_name}" "${node_pkg}/bin/${bin}"
            fi
            cd "${node_pkg}"
            if npm view "${node_pkg}@${node_version}" version >/dev/null 2>&1; then
              echo "${node_pkg}@${node_version} already on npm, skipping"
            else
              npm publish --access public
            fi
            cd ../
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish npm meta-package (idempotent)
        shell: bash
        run: |
          # The wrapper "fzd" package (the one users install) is published
          # separately by semantic-release in the normal flow; cover it here too.
          tag="${{ inputs.tag }}"; ver="${tag#v}"
          cp README.md packages/npm/fzd/ || true
          cd packages/npm/fzd
          if npm view "fzd@${ver}" version >/dev/null 2>&1; then
            echo "fzd@${ver} already on npm, skipping"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
